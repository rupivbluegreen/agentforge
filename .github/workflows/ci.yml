name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm format:check

  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Generates an SPDX SBOM for the repo and uploads it as a build artifact,
      # so an SBOM is published for every build (Phase 0 acceptance).
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: agentforge.spdx.json

  dependency-scan:
    name: Dependency scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Run Trivy via its official image (robust across action-version churn).
      - name: Trivy filesystem scan (fixed CRITICAL/HIGH fail the build)
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.58.1 fs /repo \
            --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed \
            --exit-code 1 --no-progress

  container-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f deploy/docker/Dockerfile -t agentforge-backend:ci .
      - name: Trivy image scan (fixed CRITICAL fail the build)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.58.1 \
            image agentforge-backend:ci \
            --scanners vuln --severity CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Scan the working tree with the official gitleaks image (honours .gitleaks.toml).
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.21.2 dir /repo \
            --config /repo/.gitleaks.toml --no-banner --redact --exit-code 1

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned registry rulesets (`auto` requires metrics on; we keep metrics off).
      - name: Semgrep
        run: |
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep \
            semgrep scan --config=p/default --config=p/secrets --error --metrics off

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for c in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if ! git log -1 --format=%B "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $c is missing a DCO Signed-off-by trailer"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo 'Add sign-off with: git commit -s (see CONTRIBUTING.md)'
            exit 1
          fi
